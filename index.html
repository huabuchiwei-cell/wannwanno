<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MyWordCanvas - 自由な暗記ノート</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header class="header">
      <div class="logo">MyWordCanvas</div>
      <div class="progress">Score: <span id="score-display">0</span></div>
    </header>

    <!-- Main Content -->
    <main id="main-content">
      <!-- Welcome Screen -->
      <div id="welcome-screen" class="screen active">
        <h1>英検2級レベル 英単語学習</h1>
        <p>英検2級相当の単語で「自分だけの暗記キャンバス」を作り、効率よく覚えよう！</p>
        <button id="start-btn" class="btn btn-primary">学習をスタート</button>
      </div>

      <!-- Quiz Screen -->
      <div id="quiz-screen" class="screen">
        <div class="quiz-container">
          <h2 id="word-display" class="word-text">Word</h2>
          <div class="quiz-controls">
            <button id="show-meaning-btn" class="btn btn-outline">答えを見る</button>
            <button id="open-canvas-btn" class="btn btn-accent">ヒントキャンバスを開く 💡</button>
          </div>
          
          <div id="meaning-display" class="meaning-box hidden">
            <p id="meaning-text">Meaning</p>
            <div class="judge-buttons">
              <button class="btn btn-wrong" onclick="app.judge(false)">❌ わからなかった</button>
              <button class="btn btn-correct" onclick="app.judge(true)">✅ わかった！</button>
            </div>
          </div>
        </div>
      </div>
    </main>

    <!-- Canvas Modal -->
    <div id="canvas-modal" class="modal hidden">
      <div class="modal-header">
        <h3 id="canvas-word-title">Word Canvas</h3>
        <div class="canvas-tools">
          <button id="add-text-btn" class="btn btn-small">📝 メモ追加</button>
          <button id="add-image-btn" class="btn btn-small">🖼 画像URL追加</button>
          <button id="close-canvas-btn" class="btn btn-small btn-close">閉じる</button>
        </div>
      </div>
      <div id="canvas-area" class="canvas-area">
        <!-- Draggable elements will be injected here -->
      </div>
    </div>

  </div>
  
  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
